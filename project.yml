# XcodeGen project spec for TemplateKeyboard
#
# Before running `xcodegen generate`:
#   1. Replace YOUR_TEAM_ID with your Apple Developer Team ID
#      (Find it at developer.apple.com → Account → Membership)
#   2. Replace com.yourname with your own reverse-domain prefix
#      (must match the App Group registered in your developer account)

name: TemplateKeyboard

options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: YOUR_TEAM_ID
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"       # iPhone only

targets:

  # ─── Main App ────────────────────────────────────────────────────────────────
  TemplateKeyboard:
    type: application
    platform: iOS
    sources:
      - path: TemplateKeyboard
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.TemplateKeyboard
        INFOPLIST_FILE: TemplateKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: TemplateKeyboard/TemplateKeyboard.entitlements
    dependencies:
      - target: KeyboardExtension
        embed: true

  # ─── Keyboard Extension ───────────────────────────────────────────────────────
  KeyboardExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: KeyboardExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.TemplateKeyboard.KeyboardExtension
        INFOPLIST_FILE: KeyboardExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: KeyboardExtension/KeyboardExtension.entitlements
        SKIP_INSTALL: YES
